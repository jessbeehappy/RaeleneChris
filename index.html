            Mail: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
            ZoomIn: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></svg>,
            ZoomOut: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></svg>,
            Info: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Lock: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const PinScreen = ({ onAccess }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            const [isUnlocking, setIsUnlocking] = useState(false);

            const handleKeyPress = (num) => { if (pin.length < 4) setPin(prev => prev + num); };
            const handleClear = () => setPin('');
            const handleEnter = () => {
                if (pin === CONFIG.pinCode) {
                    localStorage.setItem('weddingAuth_' + CONFIG.pinCode, 'true');
                    setIsUnlocking(true);
                    setTimeout(() => onAccess(), 600);
                } else {
                    setError(true);
                    setTimeout(() => { setPin(''); setError(false); }, 400);
                }
            };

            return (
                <div className={`min-h-screen flex flex-col items-center justify-center px-4 ${activeTheme.bg} transition-all duration-700 ease-in-out ${isUnlocking ? 'opacity-0 scale-110 blur-sm pointer-events-none' : 'opacity-100 scale-100'}`}>
                    <div className="text-center mb-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <Icons.Lock className="w-8 h-8 mx-auto mb-6 text-stone-300" />
                        <h1 className={`text-4xl sm:text-5xl font-serif mb-3 ${activeTheme.text}`}>{CONFIG.coupleNames}</h1>
                        <p className="text-stone-500 font-light tracking-wide">{CONFIG.displayDate}</p>
                        <p className="text-stone-400 font-light text-sm mt-1">{CONFIG.weddingLocation}</p>
                    </div>
                    
                    <div className={`flex justify-center gap-4 mb-8 h-4 transition-transform duration-300 ${error ? 'animate-shake' : ''}`}>
                        {[0, 1, 2, 3].map(i => <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all duration-200 ${pin.length > i ? 'bg-stone-800 border-stone-800 scale-110' : 'border-stone-300 bg-transparent'}`} />)}
                    </div>
                    {error && <p className="text-rose-500 text-sm font-medium absolute mt-[-20px] transition-opacity">Incorrect PIN</p>}

                    <div className="grid grid-cols-3 gap-4 sm:gap-6 max-w-[280px] w-full mx-auto mt-4 animate-in fade-in slide-in-from-bottom-8 duration-700 delay-150">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => <button key={num} onClick={() => handleKeyPress(num)} className={`aspect-square rounded-full bg-white shadow-sm text-2xl font-light ${activeTheme.text} active:bg-stone-200 active:scale-95 transition-all hover:shadow-md flex items-center justify-center`}>{num}</button>)}
                        <button onClick={handleClear} className="aspect-square rounded-full text-stone-400 font-medium active:bg-stone-200 active:scale-95 transition-all flex items-center justify-center text-sm uppercase tracking-wider">Clear</button>
                        <button onClick={() => handleKeyPress(0)} className={`aspect-square rounded-full bg-white shadow-sm text-2xl font-light ${activeTheme.text} active:bg-stone-200 active:scale-95 transition-all hover:shadow-md flex items-center justify-center`}>0</button>
                        <button onClick={handleEnter} className={`aspect-square rounded-full ${activeTheme.accent} shadow-md active:opacity-80 active:scale-95 transition-all flex items-center justify-center`}><Icons.ArrowRight className="w-8 h-8" /></button>
                    </div>
                </div>
            );
        };

        const HelpfulLinksModal = ({ onClose }) => (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 animate-in fade-in">
                <div className="bg-white rounded-2xl w-full max-w-sm max-h-[90vh] overflow-y-auto shadow-2xl animate-in slide-in-from-bottom-8">
                    <div className={`${activeTheme.light} px-6 py-4 flex justify-between items-center border-b ${activeTheme.border} sticky top-0 z-10`}>
                        <h3 className={`font-serif text-xl ${activeTheme.text}`}>Info & Links</h3>
                        <button onClick={onClose} className="p-1 rounded-full hover:bg-black/10 transition"><Icons.X className={`w-5 h-5 ${activeTheme.text}`} /></button>
                    </div>
                    <div className="p-6 space-y-6">
                        
                        <div>
                            <h4 className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-3">How to use this app</h4>
                            <ul className="space-y-4 text-sm text-stone-600">
                                <li className="flex gap-3 items-start">
                                    <div className="mt-0.5"><Icons.ArrowRight className="w-4 h-4 text-stone-400" /></div>
                                    <span><strong>Swipe the header</strong> left or right to easily switch between the Timeline and the Directory.</span>
                                </li>
                                <li className="flex gap-3 items-start">
                                    <div className="mt-0.5"><Icons.Search className="w-4 h-4 text-stone-400" /></div>
                                    <span><strong>Search & Filter</strong> to find specific events or view only what matters to you.</span>
                                </li>
                                <li className="flex gap-3 items-start">
                                    <div className="mt-0.5"><Icons.ChevronDown className="w-4 h-4 text-stone-400" /></div>
                                    <span><strong>Tap any event</strong> to expand it and see full details, checklists, and map links.</span>
                                </li>
                                <li className="flex gap-3 items-start">
                                    <div className="mt-0.5"><Icons.Heart className="w-4 h-4 text-rose-400" fillClass="fill-rose-100" /></div>
                                    <span><strong>Secret Checklists:</strong> Tap a filter role (like Bride or Groomsmen) 3 times fast to unlock your hidden checklist!</span>
                                </li>
                            </ul>
                        </div>

                        {CONFIG.helpfulLinks && CONFIG.helpfulLinks.length > 0 && (
                            <div className="pt-2 border-t border-stone-100">
                                <h4 className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-3">Helpful Links</h4>
                                <div className="space-y-2">
                                    {CONFIG.helpfulLinks.map((link, i) => (
                                        <a key={i} href={link.url} target="_blank" className={`flex items-center gap-3 p-4 rounded-xl border ${activeTheme.border} hover:${activeTheme.light} transition-colors group`}>
                                            <Icons.ExternalLink className={`w-5 h-5 ${activeTheme.accentText} opacity-70 group-hover:opacity-100`} />
                                            <span className="font-medium text-stone-800">{link.title}</span>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );

        const ChecklistModal = ({ data, onClose }) => {
            const theme = MODAL_THEMES[data.theme] || MODAL_THEMES.ivory;
            
            // Note: To easily test the message showing automatically, you can change this to `true`
            const isWeddingDayToday = new Date().toDateString() === new Date(CONFIG.weddingDate).toDateString();
            const hasMessage = data.messageLines && data.messageLines.length > 0;
            
            const [showMessage, setShowMessage] = useState(hasMessage && isWeddingDayToday);
            
            const initialItems = data.items ? data.items.map((item, idx) => ({ id: idx, text: item, checked: false })) : [];
            const [items, setItems] = useState(initialItems);
            
            const toggleItem = (id) => setItems(items.map(item => item.id === id ? { ...item, checked: !item.checked } : item));
            const progress = items.length > 0 ? Math.round((items.filter(i => i.checked).length / items.length) * 100) : 0;

            return (
                <div className={`fixed inset-0 ${theme.bg} z-[100] overflow-y-auto animate-in fade-in duration-300`}>
                    <button onClick={onClose} className={`fixed top-6 right-6 z-[110] p-2 rounded-full transition-colors shadow-sm ${theme.btn}`}><Icons.X className="w-6 h-6" /></button>
                    
                    <div className="max-w-2xl mx-auto p-6 pt-12 min-h-screen flex flex-col">
                        <div className="flex justify-between items-start mb-6 pr-12">
                            <div>
                                <h2 className={`text-4xl font-serif mb-1 ${theme.title}`}>{data.title}</h2>
                                <p className={`${theme.signoff} font-mono text-sm tracking-widest uppercase`}>Checklist</p>
                            </div>
                        </div>

                        {/* Hidden Message that expands ABOVE checklist */}
                        <div className={`overflow-hidden transition-all duration-500 ease-in-out ${showMessage ? 'max-h-[1000px] opacity-100 mb-8' : 'max-h-0 opacity-0 mb-0'}`}>
                            {hasMessage && (
                                <div className={`p-6 ${theme.checkBg} rounded-xl border ${theme.border} text-center shadow-sm`}>
                                    <Icons.Heart className={`w-8 h-8 mx-auto mb-4 ${theme.iconColor}`} />
                                    <div className={`space-y-4 font-light text-lg leading-relaxed ${theme.text}`}>
                                        {data.messageLines.map((line, i) => (<p key={i} className={i === 0 ? `text-2xl font-serif italic ${theme.title}` : ""}>{line}</p>))}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className={`sticky top-0 z-30 ${theme.bg} pb-6 pt-2 mb-2 border-b ${theme.border}`}>
                            <div className={`flex justify-between text-xs font-mono mb-2 uppercase tracking-wider ${theme.signoff}`}>
                                <span>{progress === 100 ? "Ready!" : "Readiness"}</span>
                                <span>{progress}%</span>
                            </div>
                            <div className={`h-1 ${theme.progressBg} rounded-full overflow-hidden`}><div className={`h-full ${theme.progressFill} transition-all duration-500 ease-out`} style={{ width: `${progress}%` }}></div></div>
                        </div>

                        <div className="space-y-3 py-4 flex-1">
                            {items.map(item => (
                                <label key={item.id} className={`group flex items-center p-4 border rounded-xl cursor-pointer transition-all ${theme.checkBg} ${theme.border} hover:shadow-sm`}>
                                    <input type="checkbox" className="hidden custom-checkbox" checked={item.checked} onChange={() => toggleItem(item.id)} />
                                    <div className={`w-6 h-6 border-2 rounded-md flex items-center justify-center mr-4 transition-colors ${theme.checkBorder} ${item.checked ? theme.checkFill : ''}`}>
                                        <Icons.Check className={`w-4 h-4 ${data.theme === 'dark' || data.theme === 'charcoal' ? 'text-black' : 'text-white'} ${item.checked ? 'block' : 'hidden'}`} />
                                    </div>
                                    <span className={`text-lg font-light tracking-wide transition-colors ${item.checked ? theme.checkedText : theme.text}`}>{item.text}</span>
                                </label>
                            ))}
                        </div>

                        <div className="mt-8 text-center pb-8 flex flex-col items-center">
                            {data.footer && <p className={`${theme.signoff} text-xs font-mono uppercase tracking-[0.2em] mb-6`}>{data.footer}</p>}
                            {/* The Secret Toggle Heart */}
                            {hasMessage && (
                                <button onClick={() => setShowMessage(!showMessage)} className="p-2 outline-none mt-2">
                                    <Icons.Heart className={`w-6 h-6 ${theme.iconColor} ${showMessage ? 'opacity-100' : 'opacity-40'} hover:opacity-100 transition-opacity cursor-pointer`} />
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const WeddingTimeline = () => {
            const [expandedEvents, setExpandedEvents] = useState([]);
            const [selectedFilters, setSelectedFilters] = useState(['all']);
            const [searchQuery, setSearchQuery] = useState('');
            const [expandAll, setExpandAll] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [countdown, setCountdown] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            
            const [showFilters, setShowFilters] = useState(false);
            const [showLinks, setShowLinks] = useState(false);
            const [activeChecklist, setActiveChecklist] = useState(null); 
            const [filterClicks, setFilterClicks] = useState({ id: null, count: 0 }); 
            
            const [view, setView] = useState('timeline'); 
            const [directoryTab, setDirectoryTab] = useState('vendors');
            const [mapZoom, setMapZoom] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const timelineScrollRef = useRef(null); 
            const activeRef = useRef(null); 
            const weddingDate = new Date(CONFIG.weddingDate);

            // Native Smooth Scroll Tracking
            const handleTimelineScroll = (e) => {
                const scrollTop = e.currentTarget.scrollTop;
                if (scrollTop > 100 && !isScrolled) setIsScrolled(true);
                else if (scrollTop <= 100 && isScrolled) setIsScrolled(false);
            };

            useEffect(() => { const timer = setInterval(() => setCurrentTime(new Date()), 60000); return () => clearInterval(timer); }, []);

            useEffect(() => {
                const updateCountdown = () => {
                    const now = new Date();
                    const difference = weddingDate.getTime() - now.getTime();
                    if (difference > 0) {
                        setCountdown({ days: Math.floor(difference / (1000 * 60 * 60 * 24)), hours: Math.floor((difference / (1000 * 60 * 60)) % 24), minutes: Math.floor((difference / 1000 / 60) % 60), seconds: Math.floor((difference / 1000) % 60) });
                    } else { setCountdown({ days: 0, hours: 0, minutes: 0, seconds: 0 }); }
                };
                updateCountdown();
                const timer = setInterval(updateCountdown, 1000);
                return () => clearInterval(timer);
            }, []);

            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);
            const minSwipeDistance = 50;
            
            const onTouchStart = (e) => { setTouchEnd(null); setTouchStart(e.targetTouches[0].clientX); };
            const onTouchMove = (e) => { setTouchEnd(e.targetTouches[0].clientX); };
            const onTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                const distance = touchStart - touchEnd;
                if (distance > minSwipeDistance) {
                    if (view === 'timeline') setView('vendors');
                    if (view === 'map') setView('timeline');
                }
                if (distance < -minSwipeDistance) {
                    if (view === 'timeline' && CONFIG.enableMapScreen) setView('map');
                    if (view === 'vendors') setView('timeline');
                }
            };

            const scrollToTop = () => {
                if (timelineScrollRef.current) timelineScrollRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const parseEventTime = (timeStr) => {
                const [time, period] = timeStr.split(' ');
                let [hours, minutes] = time.split(':').map(Number);
                if (period === 'PM' && hours !== 12) hours += 12;
                if (period === 'AM' && hours === 12) hours = 0;
                return hours * 60 + minutes; 
            };

            const isWeddingDay = true; // Force true to demonstrate functionality
            const currentMinutes = currentTime.getHours() * 60 + currentTime.getMinutes();

            const getEventStatus = (eventTimeStr, nextEventTimeStr) => {
                if (!isWeddingDay) return 'future';
                const eMins = parseEventTime(eventTimeStr);
                const nextMins = nextEventTimeStr ? parseEventTime(nextEventTimeStr) : 1440;
                if (currentMinutes >= eMins && currentMinutes < nextMins) return 'now';
                if (currentMinutes >= nextMins) return 'past';
                return 'future';
            };

            const renderDescriptionContent = (desc) => {
                if (!desc) return null;
                if (typeof desc === 'string') return <p className="text-stone-700 mt-4 leading-relaxed">{desc}</p>;
                if (Array.isArray(desc)) {
                    if (typeof desc[0] === 'string') return <ul className="text-stone-700 mt-4 leading-relaxed list-none space-y-2">{desc.map((line, idx) => <li key={idx} className="flex items-start gap-2"><span className="text-stone-400 mt-1.5 w-1.5 h-1.5 rounded-full bg-stone-300 shrink-0"></span><span>{line}</span></li>)}</ul>;
                    if (typeof desc[0] === 'object') {
                        return (
                            <div className="mt-4 space-y-4">
                                {desc.map((section, idx) => {
                                    if (section.type === 'paragraph' || section.type === 'text') return <p key={idx} className="text-stone-700 leading-relaxed">{section.text}</p>;
                                    if (section.type === 'list') return <ul key={idx} className="text-stone-700 leading-relaxed list-none space-y-2 pl-1">{section.items.map((line, i) => <li key={i} className="flex items-start gap-2"><span className="text-stone-400 mt-1.5 w-1.5 h-1.5 rounded-full bg-stone-300 shrink-0"></span><span>{line}</span></li>)}</ul>;
                                    if (section.type === 'checklist') return <div key={idx} className={`space-y-2 bg-stone-50 p-3 rounded-lg border border-stone-200`} onClick={e => e.stopPropagation()}>{section.items.map((item, i) => <label key={i} className="flex items-center gap-3 cursor-pointer group"><div className="relative flex items-center"><input type="checkbox" className="peer appearance-none w-5 h-5 border-2 border-stone-300 rounded bg-white checked:bg-black checked:border-black transition-colors" /><Icons.Check className="w-3.5 h-3.5 text-white absolute left-[3px] top-[3px] opacity-0 peer-checked:opacity-100 pointer-events-none" /></div><span className="text-sm text-stone-600 group-hover:text-black transition-colors select-none">{item}</span></label>)}</div>;
                                    return null;
                                })}
                            </div>
                        );
                    }
                }
                return null;
            };

            const filteredEvents = events.filter(event => {
                const teamMatch = selectedFilters.includes('all') || event.teams.includes('all') || event.teams.some(team => selectedFilters.includes(team));
                const searchTextMatches = (text) => text.toLowerCase().includes(searchQuery.toLowerCase());
                let descMatch = false;
                if (typeof event.description === 'string') descMatch = searchTextMatches(event.description);
                else if (Array.isArray(event.description)) descMatch = event.description.some(item => typeof item === 'string' ? searchTextMatches(item) : (item.text && searchTextMatches(item.text)) || (item.items && item.items.some(i => searchTextMatches(i))));
                const searchMatch = searchQuery === '' || searchTextMatches(event.title) || descMatch || searchTextMatches(event.location) || searchTextMatches(event.time) || (event.responsible && event.responsible.some(r => searchTextMatches(r)));
                return teamMatch && searchMatch;
            });

            let currentEventId = null;
            if (isWeddingDay) {
                for (let i = 0; i < filteredEvents.length; i++) {
                    if (getEventStatus(filteredEvents[i].time, filteredEvents[i+1]?.time) === 'now') { currentEventId = filteredEvents[i].id; break; }
                }
                if (!currentEventId) {
                    const next = filteredEvents.find(e => parseEventTime(e.time) > currentMinutes);
                    if (next) currentEventId = next.id;
                }
            }
            if (!isWeddingDay && filteredEvents.length > 0) currentEventId = filteredEvents[0].id;

            useEffect(() => {
                if (timelineScrollRef.current) timelineScrollRef.current.scrollTo({ top: 0, left: 0, behavior: 'instant' });
                setIsScrolled(false);
                if (activeRef.current && view === 'timeline') {
                    setTimeout(() => activeRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500); 
                }
            }, [view]);

            const toggleFilter = (filterId) => {
                let clicks = 1;
                if (filterClicks.id === filterId) {
                    clicks = filterClicks.count + 1;
                }
                setFilterClicks({ id: filterId, count: clicks });

                if (CONFIG.checklists[filterId] && clicks >= 3) {
                    setActiveChecklist(filterId);
                    setFilterClicks({ id: null, count: 0 }); // reset
                    return; 
                }

                if (filterId === 'all') { 
                    setSelectedFilters(['all']); 
                    setFilterClicks({ id: null, count: 0 });
                } else {
                    setSelectedFilters(prev => {
                        const clean = prev.filter(f => f !== 'all');
                        const isSelected = clean.includes(filterId);

                        if (isSelected) { 
                            if (CONFIG.checklists[filterId] && clicks === 2) return prev; // Do not unselect on double tap
                            const updated = clean.filter(f => f !== filterId); 
                            return updated.length === 0 ? ['all'] : updated; 
                        } else { 
                            return [...clean, filterId]; 
                        }
                    });
                }
            };

            const toggleEvent = (id) => {
                if (expandAll) return;
                setExpandedEvents(prev => prev.includes(id) ? prev.filter(e => e !== id) : [...prev, id]);
            };
            
            const toggleExpandAll = () => { 
                if (expandAll) { setExpandAll(false); setExpandedEvents([]); } 
                else { setExpandAll(true); setExpandedEvents(filteredEvents.map(e => e.id)); }
            };

            const layoutWidth = CONFIG.enableMapScreen ? 'w-[300%]' : 'w-[200%]';
            const translation = CONFIG.enableMapScreen ? (view === 'map' ? '0' : view === 'timeline' ? '33.333' : '66.666') : (view === 'timeline' ? '0' : '50');
            const panelWidth = CONFIG.enableMapScreen ? 'w-1/3' : 'w-1/2';

            return (
                <div className={`overflow-x-hidden w-full relative min-h-screen ${activeTheme.bg}`}>
                    {activeChecklist && <ChecklistModal data={CONFIG.checklists[activeChecklist]} onClose={() => setActiveChecklist(null)} />}
                    {showLinks && <HelpfulLinksModal onClose={() => setShowLinks(false)} />}

                    <div className="hidden md:block fixed top-1/2 left-8 z-50 transform -translate-y-1/2">
                        {view === 'timeline' && CONFIG.enableMapScreen && <button onClick={() => setView('map')} className="bg-white/80 backdrop-blur shadow-lg p-4 rounded-full hover:bg-white transition-all hover:scale-110 border border-stone-100"><Icons.ArrowLeft className="w-6 h-6 text-stone-600" /></button>}
                        {view === 'vendors' && <button onClick={() => setView('timeline')} className="bg-white/80 backdrop-blur shadow-lg p-4 rounded-full hover:bg-white transition-all hover:scale-110 border border-stone-100"><Icons.ArrowLeft className="w-6 h-6 text-stone-600" /></button>}
                    </div>
                    <div className="hidden md:block fixed top-1/2 right-8 z-50 transform -translate-y-1/2">
                        {view === 'timeline' && <button onClick={() => setView('vendors')} className="bg-white/80 backdrop-blur shadow-lg p-4 rounded-full hover:bg-white transition-all hover:scale-110 border border-stone-100"><Icons.ArrowRight className="w-6 h-6 text-stone-600" /></button>}
                        {view === 'map' && <button onClick={() => setView('timeline')} className="bg-white/80 backdrop-blur shadow-lg p-4 rounded-full hover:bg-white transition-all hover:scale-110 border border-stone-100"><Icons.ArrowRight className="w-6 h-6 text-stone-600" /></button>}
                    </div>

                    <div className={`flex ${layoutWidth} transition-transform duration-500 ease-in-out h-screen md:h-[100dvh]`} style={{ transform: `translateX(-${translation}%)` }}>
                        
                        {/* --- VIEW 1: MAP --- */}
                        {CONFIG.enableMapScreen && (
                            <div className={`${panelWidth} shrink-0 h-screen md:h-[100dvh] relative bg-stone-200 flex flex-col`}>
                                <div className="absolute top-6 left-6 z-10"><button onClick={() => setView('timeline')} className="bg-white/90 p-3 rounded-full shadow-md"><Icons.ArrowRight className="w-6 h-6 text-stone-600" /></button></div>
                                <div onClick={() => setMapZoom(!mapZoom)} className={`flex-1 relative overflow-hidden flex items-center justify-center cursor-zoom-in ${mapZoom ? 'cursor-grab active:cursor-grabbing' : ''}`}>
                                    <div className={`transition-all duration-300 w-full h-full ${mapZoom ? 'overflow-auto no-scrollbar' : 'overflow-hidden flex items-center justify-center'}`}>
                                        <img src={CONFIG.mapImageURL} alt="Map" className={`transition-transform duration-300 origin-center ${mapZoom ? 'w-[250%] max-w-none' : 'w-full h-full object-contain p-4'}`} />
                                    </div>
                                </div>
                                <div className={`absolute bottom-8 left-1/2 transform -translate-x-1/2 bg-black/70 text-white px-4 py-2 rounded-full text-xs font-medium transition-opacity duration-300 ${mapZoom ? 'opacity-0' : 'opacity-100'}`}>Tap map to zoom</div>
                            </div>
                        )}

                        {/* --- VIEW 2: TIMELINE --- */}
                        <div ref={timelineScrollRef} onScroll={handleTimelineScroll} className={`${panelWidth} shrink-0 relative z-20 h-screen md:h-[100dvh] overflow-y-auto ${activeTheme.bg}`}>
                            
                            {/* NATIVE SCROLL-AWAY HEADER */}
                            <header className="max-w-4xl mx-auto px-4 py-8 text-center select-none flex flex-col items-center justify-center" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                                <div className="w-full flex justify-center pb-6 md:hidden"><div className="w-12 h-1.5 bg-stone-200 rounded-full"></div></div>
                                <h1 className={`text-4xl font-serif mb-2 ${activeTheme.text}`}>{CONFIG.coupleNames}</h1>
                                <p className="text-stone-600 font-light tracking-wide">{CONFIG.displayDate}</p>
                                <p className="text-stone-400 font-light text-sm mt-1">{CONFIG.weddingLocation}</p>
                                {countdown.days > 0 || countdown.hours > 0 || countdown.minutes > 0 ? (
                                    <div className="mt-4 flex items-center justify-center gap-4">
                                        <Icons.Clock className="w-4 h-4 text-stone-400" />
                                        <div className="flex gap-3 text-sm">
                                            <div className="flex flex-col items-center"><span className={`text-2xl font-serif ${activeTheme.text}`}>{countdown.days}</span><span className="text-xs text-stone-500 uppercase tracking-wide">Days</span></div>
                                            <div className="flex flex-col items-center"><span className={`text-2xl font-serif ${activeTheme.text}`}>{countdown.hours}</span><span className="text-xs text-stone-500 uppercase tracking-wide">Hours</span></div>
                                            <div className="flex flex-col items-center"><span className={`text-2xl font-serif ${activeTheme.text}`}>{countdown.minutes}</span><span className="text-xs text-stone-500 uppercase tracking-wide">Mins</span></div>
                                        </div>
                                    </div>
                                ) : isWeddingDay ? (
                                    <div className="mt-4"><p className={`text-lg font-serif ${activeTheme.text}`}>Today's the day! 🎉</p></div>
                                ) : (
                                    <div className="mt-4"><p className="text-sm text-stone-500">The big day has arrived!</p></div>
                                )}
                            </header>

                            {/* TRUE STICKY FILTER BAR */}
                            <div className="sticky top-0 z-50 w-full bg-white/95 backdrop-blur shadow-sm border-b border-stone-200 transition-all duration-300" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                                <div className="max-w-4xl mx-auto px-4 w-full">
                                    <div className="flex items-center justify-between w-full py-4">
                                        <button onClick={scrollToTop} className={`pr-4 pl-2 text-stone-400 hover:${activeTheme.text} transition-opacity duration-300 md:hidden ${isScrolled ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                                            <Icons.ArrowUp className="w-5 h-5" />
                                        </button>

                                        <button onClick={() => { if(isScrolled) scrollToTop(); setShowFilters(!showFilters); }} className={`flex-1 flex items-center justify-center gap-2 text-stone-600 hover:${activeTheme.text} transition-colors`}>
                                            <Icons.Search className="w-4 h-4" /><span className="font-serif text-sm uppercase tracking-wider">Search & Filters</span>
                                            {showFilters ? <Icons.ChevronUp className="w-4 h-4" /> : <Icons.ChevronDown className="w-4 h-4" />}
                                        </button>
                                        
                                        <div className="w-px h-6 bg-stone-200 mx-2"></div>
                                        <button onClick={() => setShowLinks(true)} className={`flex items-center gap-2 text-stone-600 hover:${activeTheme.text} pl-2`}>
                                            <Icons.Info className="w-5 h-5" />
                                        </button>
                                    </div>

                                    {showFilters && (
                                        <div className="pb-6 animate-in slide-in-from-top-2 border-t border-stone-100 pt-4">
                                            <div className="mb-4">
                                                <input type="text" placeholder="Search events, locations..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full px-4 py-2 rounded-lg border border-stone-300 focus:border-black outline-none bg-stone-50"/>
                                            </div>
                                            <div className="flex flex-wrap gap-2 justify-center">
                                                {CONFIG.filters.map(filter => (
                                                    <button key={filter.id} onClick={() => toggleFilter(filter.id)} className={`px-4 py-2 rounded-full text-sm font-light tracking-wide transition-all ${selectedFilters.includes(filter.id) ? activeTheme.accent : `${activeTheme.light} ${activeTheme.text} hover:opacity-80`}`}>
                                                        {filter.label}
                                                    </button>
                                                ))}
                                                <div className="w-px h-6 bg-stone-300 mx-2 mt-1"></div>
                                                <button onClick={toggleExpandAll} className={`px-4 py-2 rounded-full text-sm font-light tracking-wide ${activeTheme.text} bg-white border border-stone-200 hover:bg-stone-50 shadow-sm`}>{expandAll ? 'Collapse All' : 'Expand All'}</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* TIMELINE LIST */}
                            <div className="w-full relative pb-32">
                                <div className="max-w-3xl mx-auto w-full px-4 pt-4 relative">
                                    <div className="absolute left-[3.25rem] top-4 bottom-0 w-px bg-stone-300 z-0"></div>
                                    
                                    <div className="space-y-6">
                                        {filteredEvents.map((event, index) => {
                                            const isExpanded = expandAll || expandedEvents.includes(event.id);
                                            const status = getEventStatus(event.time, filteredEvents[index+1]?.time);
                                            const isPast = status === 'past';
                                            const isNow = status === 'now';
                                            const isFirstActive = event.id === currentEventId;

                                            return (
                                                <div key={event.id} ref={isFirstActive ? activeRef : null} className={`relative z-10 transition-all duration-300 ease-in-out ${isPast ? 'opacity-60 grayscale' : ''}`}>
                                                    
                                                    {isExpanded ? (
                                                        <div className="flex flex-col w-full py-2 fade-in-up">
                                                            <div className="flex justify-center mb-4">
                                                                <span className={`px-4 py-1.5 rounded-full text-sm font-medium shadow-md ${isPast ? 'bg-stone-200 text-stone-500' : activeTheme.accent}`}>{event.time}</span>
                                                            </div>
                                                            <div className="bg-white rounded-xl shadow-xl border border-stone-300 overflow-hidden w-full">
                                                                <button onClick={() => toggleEvent(event.id)} className="w-full px-6 py-5 text-left flex items-center justify-between bg-white outline-none">
                                                                    <div className="flex-1 pr-4">
                                                                        <h3 className={`text-xl font-serif mb-2 ${activeTheme.text}`}>{event.title}</h3>
                                                                        <div className="flex flex-col gap-2">
                                                                            <a href={`http://googleusercontent.com/maps.google.com/?q=${encodeURIComponent(event.location)}`} target="_blank" rel="noopener noreferrer" className={`inline-flex items-center gap-1.5 text-sm text-stone-500 font-light hover:${activeTheme.accentText} transition-colors w-fit`} onClick={e => e.stopPropagation()}>
                                                                                <Icons.MapPin className="w-3.5 h-3.5" />
                                                                                <span className="underline underline-offset-2">{event.location}</span>
                                                                            </a>
                                                                            {event.responsible && (
                                                                                <div className="flex items-center gap-1.5 text-xs text-stone-400 font-medium uppercase tracking-wide">
                                                                                    <Icons.User className="w-3.5 h-3.5" />
                                                                                    {event.responsible.join(', ')}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                    <Icons.ChevronUp className="w-5 h-5 text-stone-400 shrink-0" />
                                                                </button>
                                                                <div className="px-6 pb-6 border-t border-stone-100">
                                                                    {renderDescriptionContent(event.description)}
                                                                    <div className="mt-5 flex flex-wrap gap-2">{event.teams.map(team => (<span key={team} className={`px-3 py-1 ${activeTheme.light} ${activeTheme.text} text-xs rounded-full border ${activeTheme.border}`}>{CONFIG.filters.find(f => f.id === team)?.label || team}</span>))}</div>
                                                                    {event.image && <img src={event.image} alt={event.title} className="mt-4 rounded-xl w-full border border-stone-100" />}
                                                                    {event.links && event.links.length > 0 && (
                                                                        <div className="mt-4 space-y-2">
                                                                            {event.links.map((link, idx) => (
                                                                                <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className={`inline-flex items-center gap-2 ${activeTheme.accentText} text-sm underline-offset-4 hover:underline transition-colors`}><Icons.ExternalLink className="w-4 h-4" />{link.text}</a>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-start w-full relative pl-[5.5rem]">
                                                            <div className="absolute left-0 w-20 flex justify-center mt-1">
                                                                <span className={`px-3 py-1.5 rounded-lg text-sm font-medium tracking-wide shadow-sm transition-all ${isPast ? 'bg-stone-200 text-stone-500' : isNow ? `${activeTheme.accent} shadow-md` : 'bg-white border border-stone-200 text-stone-700'}`}>{event.time}</span>
                                                            </div>
                                                            <button onClick={() => toggleEvent(event.id)} className={`bg-white rounded-xl border border-stone-200 transition-all duration-300 ease-in-out w-full shadow-sm hover:shadow-md ${isNow ? 'shadow-md border-stone-300' : ''} px-6 py-5 text-left flex items-center justify-between outline-none`}>
                                                                <div className="flex-1 pr-4">
                                                                    <h3 className={`text-xl font-serif mb-2 ${activeTheme.text}`}>{event.title}</h3>
                                                                    <div className="flex flex-col gap-2">
                                                                        <a href={`http://googleusercontent.com/maps.google.com/?q=${encodeURIComponent(event.location)}`} target="_blank" rel="noopener noreferrer" className={`inline-flex items-center gap-1.5 text-sm text-stone-500 font-light hover:${activeTheme.accentText} transition-colors w-fit`} onClick={e => e.stopPropagation()}>
                                                                            <Icons.MapPin className="w-3.5 h-3.5" />
                                                                            <span className="underline underline-offset-2 truncate max-w-[200px] sm:max-w-none">{event.location}</span>
                                                                        </a>
                                                                    </div>
                                                                </div>
                                                                <Icons.ChevronDown className="w-5 h-5 text-stone-400 shrink-0" />
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                <footer className="mt-8 border-t border-stone-200 w-full max-w-4xl mx-auto">
                                    <div className="px-4 py-12 text-center">
                                        <Icons.Heart className={`w-6 h-6 mx-auto mb-4 ${activeTheme.text} opacity-30`} fillClass="fill-transparent" />
                                        <p className="text-stone-600 font-light text-sm">{CONFIG.footerMessage}</p>
                                        <p className="text-stone-400 font-serif italic text-sm mt-4">{CONFIG.footerSignoff}</p>
                                    </div>
                                </footer>
                            </div>
                        </div>

                        {/* --- VIEW 3: DIRECTORY (RIGHT) --- */}
                        <div className={`${panelWidth} shrink-0 h-screen md:h-[100dvh] overflow-y-auto relative ${activeTheme.bg} flex flex-col`}>
                            <div className="bg-white/95 backdrop-blur border-b border-stone-200 sticky top-0 z-50 shrink-0" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
                                <div className="w-full flex justify-center pt-3 md:hidden"><div className="w-12 h-1.5 bg-stone-200 rounded-full"></div></div>
                                <div className="max-w-3xl mx-auto px-6 py-6 pt-4 text-center select-none relative">
                                    <button onClick={() => setView('timeline')} className="absolute left-6 top-5 p-2 text-stone-400 hover:text-black md:hidden">
                                        <Icons.ArrowLeft className="w-6 h-6" />
                                    </button>
                                    <h2 className={`text-3xl font-serif mb-1 ${activeTheme.text}`}>Directory</h2>
                                    <p className="text-stone-500 text-sm font-light">Key contacts for the big day.</p>
                                </div>
                                <div className="max-w-3xl mx-auto flex justify-center pb-0 space-x-2">
                                    <button onClick={() => setDirectoryTab('vendors')} className={`px-4 py-3 font-serif text-sm transition-colors ${directoryTab === 'vendors' ? `border-b-2 ${activeTheme.border} ${activeTheme.text}` : 'text-stone-400 hover:text-stone-600'}`}>Vendors</button>
                                    <button onClick={() => setDirectoryTab('responsible')} className={`px-4 py-3 font-serif text-sm transition-colors ${directoryTab === 'responsible' ? `border-b-2 ${activeTheme.border} ${activeTheme.text}` : 'text-stone-400 hover:text-stone-600'}`}>Responsible People</button>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto w-full">
                                <div className="max-w-3xl mx-auto w-full px-4 py-8">
                                    {directoryTab === 'responsible' && (
                                        <div className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden animate-in fade-in zoom-in-95 duration-300">
                                            <div className="divide-y divide-stone-100">
                                                {responsiblePeople.map((person, idx) => (
                                                    <div key={idx} className="p-5 flex items-center justify-between hover:bg-stone-50 transition-colors">
                                                        <div>
                                                            <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-1">{person.role}</p>
                                                            <h3 className={`text-base font-medium ${activeTheme.text}`}>{person.name}</h3>
                                                        </div>
                                                        <a href={`tel:${person.contact}`} className={`flex items-center justify-center gap-2 ${activeTheme.accent} w-10 h-10 rounded-full hover:opacity-90 transition-colors`}><Icons.Phone className="w-4 h-4" /></a>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {directoryTab === 'vendors' && (
                                        <div className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden animate-in fade-in zoom-in-95 duration-300">
                                            <div className="divide-y divide-stone-100">
                                                {vendors.map((vendor, idx) => (
                                                    <div key={idx} className="p-5 flex flex-col sm:flex-row gap-4 sm:items-center justify-between hover:bg-stone-50 transition-colors">
                                                        <div>
                                                            <p className="text-xs font-bold uppercase tracking-widest text-stone-400 mb-1">{vendor.role}</p>
                                                            <h3 className={`text-base font-medium ${activeTheme.text}`}>{vendor.name}</h3>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            {vendor.email && (
                                                                <a href={`mailto:${vendor.email}`} className={`flex items-center justify-center gap-2 border border-stone-200 ${activeTheme.text} w-10 h-10 rounded-full hover:bg-stone-50 transition-colors`}><Icons.Mail className="w-4 h-4" /></a>
                                                            )}
                                                            {vendor.contact && vendor.contact !== 'TBA' ? (
                                                                <a href={`tel:${vendor.contact}`} className={`flex items-center gap-2 ${activeTheme.accent} px-4 h-10 rounded-full text-sm font-medium hover:opacity-90 transition-colors`}><Icons.Phone className="w-4 h-4" /><span>Call</span></a>
                                                            ) : (
                                                                <span className="text-xs text-stone-400 font-mono bg-stone-100 px-3 h-10 rounded-full flex items-center">TBA</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    <div className="mt-12 text-center pb-12"><button onClick={() => setView('timeline')} className="text-stone-500 hover:text-black text-sm flex items-center justify-center gap-2 mx-auto transition-colors"><Icons.ArrowLeft className="w-4 h-4" />Back to Timeline</button></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            useEffect(() => {
                if (localStorage.getItem('weddingAuth_' + CONFIG.pinCode) === 'true') {
                    setIsAuthenticated(true);
                }
            }, []);

            if (!isAuthenticated) return <PinScreen onAccess={() => setIsAuthenticated(true)} />;
            return <div className="animate-in fade-in zoom-in-95 duration-500 ease-out"><WeddingTimeline /></div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <script>
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>
</body>
</html>
